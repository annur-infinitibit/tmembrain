name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MEMBRAIN_LIB_PATH: ${{ github.workspace }}/target/debug/libmembrain_ffi.so

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: build ffi
        run: cargo build -p membrain-ffi
      - name: install python sdk
        working-directory: membrain-py
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest membrain-py with coverage
        working-directory: membrain-py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest -v --cov=membrain --cov-report=lcov --cov-fail-under=80
      - name: pytest integration
        working-directory: tests/python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: membrain-py/coverage.lcov
          retention-days: 7
          if-no-files-found: ignore
