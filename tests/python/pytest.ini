[pytest]
# Pytest configuration for Membrain tests
asyncio_mode = auto

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Markers for categorizing tests
markers =
    openai: Tests that require OpenAI API key
    slow: Tests that take a long time to run
    graph: Tests related to graph memory
    multiagent: Tests for multi-agent systems
    integration: Integration tests that test multiple components
    docs: Tests derived from documentation examples

# Test paths
testpaths = .

# Coverage options (if using pytest-cov)
# addopts = --cov=membrain --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
